<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Reports — Riven</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text-muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);max-width:700px;margin:0 auto;padding:24px;line-height:1.6;}
h1{color:#fff;font-size:1.5rem;margin-bottom:4px;}
.subtitle{color:var(--text-muted);font-size:0.85rem;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px;margin:10px 0;}
.report-link{display:block;text-decoration:none;color:var(--text);border-radius:6px;transition:border-color 0.15s;}
.report-link:hover{border-color:var(--blue);}
.report-link h3{color:var(--blue);font-size:0.95rem;margin:0;}
.report-link .date{color:var(--text-muted);font-size:0.8rem;margin-top:3px;}
.count{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:0.8rem;color:var(--text-muted);}
.count strong{color:var(--text);}
.footer{text-align:center;color:var(--text-muted);font-size:0.75rem;margin-top:32px;}
.note{background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.3);border-radius:6px;padding:12px;margin-bottom:16px;font-size:0.85rem;color:var(--text-muted);}
</style>
</head>
<body>
<h1>📊 Crypto Reports</h1>
<div class="subtitle">Daily crypto market intelligence — generated by Riven</div>
<div class="note">⚠️ Reports are served from <code>crypto-reports-cc8.pages.dev</code>. This page auto-lists all available reports.</div>
<div class="count"><strong id="count">—</strong> report(s)</div>
<div id="reports"><em style="color:var(--text-muted)">Loading reports...</em></div>
<script>
const base = 'https://raw.githubusercontent.com/stvagi88/crypto-reports/main/09_project-summaries/daily/';
fetch('https://api.github.com/repos/stvagi88/crypto-reports/contents/09_project-summaries/daily', {
  headers: {'Accept': 'application/vnd.github.v3+json'}
}).then(r=>r.json()).then(files=>{
  const htmls = files.filter(f=>f.name.endsWith('.html')).sort().reverse().map(f=>{
    const d = f.name.replace('crypto-research-','').replace('.html','');
    const date = new Date(d+'T00:00:00');
    const nice = date.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    return '<a href="'+base+f.name+'" class="report-link" target="_blank"><div class="card"><h3>📋 '+nice+'</h3><div class="date">'+d+'</div></div></a>';
  }).join('');
  document.getElementById('reports').innerHTML=htmls||'<p style="color:var(--text-muted)">No reports yet. First report generates tomorrow at 7AM MYT.</p>';
  document.getElementById('count').textContent=files.filter(f=>f.name.endsWith('.html')).length;
}).catch(()=>{
  document.getElementById('reports').innerHTML='<p style="color:var(--text-muted)">Could not load reports. Visit <a href="https://crypto-reports-cc8.pages.dev/" style="color:var(--blue)">crypto-reports-cc8.pages.dev</a> directly.</p>';
});
</script>
</body>
</html>
