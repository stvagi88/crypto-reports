name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest reports from obsidian-vault
        run: |
          git remote add vault https://github.com/stvagi88/obsidian-vault.git
          git fetch vault main
          git checkout vault/main -- 09_project-summaries/daily/ || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 424d8b0febceebc669bc3d5397fbe053
          projectName: crypto-reports
          directory: 09_project-summaries/daily
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
