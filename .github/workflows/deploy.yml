name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy reports from source repo
        run: |
          git remote add source https://github.com/stvagi88/obsidian-vault.git
          git fetch source
          git checkout source/main -- 09_project-summaries/daily/ 2>/dev/null || true
          
      - name: Copy HTML template
        run: |
          git remote add source https://github.com/stvagi88/obsidian-vault.git
          git fetch source
          git checkout source/main -- 06_system/templates/daily-crypto-report.html 2>/dev/null || true
          
      - name: Find and copy all HTML files
        run: |
          mkdir -p _reports
          find . -name "*.html" -not -path "./.git/*" -exec cp {} _reports/ \;
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_reports
          publish_branch: gh-pages
